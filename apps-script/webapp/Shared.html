<style>
:root {
  --color-bg: #f4f5f9;
  --color-surface: #ffffff;
  --color-navy: #16223f;
  --color-navy-light: #223361;
  --color-gold: #d9a441;
  --color-gold-light: #f2d9a1;
  --color-text: #232838;
  --color-text-muted: #6b7280;
  --color-border: #e3e5ec;
  --color-danger: #c0392b;
  --radius: 12px;
  --shadow: 0 2px 10px rgba(22, 34, 63, 0.06);
  --shadow-hover: 0 6px 20px rgba(22, 34, 63, 0.12);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
}

a { color: inherit; text-decoration: none; }

.container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ---------- Top nav ---------- */
.topnav {
  background: var(--color-navy);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow);
}
.topnav .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 17px;
  color: #fff;
}
.brand .dot { color: var(--color-gold); }
.nav-links {
  display: flex;
  gap: 6px;
}
.nav-links a {
  color: rgba(255,255,255,0.75);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  transition: background .15s, color .15s;
}
.nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-links a.active { background: var(--color-gold); color: var(--color-navy); }

/* ---------- Hero ---------- */
.hero {
  background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-navy-light) 100%);
  color: #fff;
  padding: 56px 0 72px;
}
.hero h1 {
  font-size: 30px;
  margin: 0 0 12px;
}
.hero p {
  color: rgba(255,255,255,0.75);
  max-width: 640px;
  font-size: 15px;
  margin: 0 0 28px;
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .1s, box-shadow .15s, background .15s;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--color-gold); color: var(--color-navy); }
.btn-primary:hover { background: #e6b459; }
.btn-ghost { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.35); }
.btn-ghost:hover { background: rgba(255,255,255,0.18); }
.btn-outline { background: transparent; color: var(--color-navy); border: 1px solid var(--color-border); }
.btn-outline:hover { border-color: var(--color-navy); }
.btn-sm { padding: 6px 12px; font-size: 13px; }

/* ---------- Stat cards ---------- */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-top: -44px;
  margin-bottom: 36px;
}
.stat-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 22px;
}
.stat-card .num { font-size: 28px; font-weight: 700; color: var(--color-navy); }
.stat-card .label { font-size: 13px; color: var(--color-text-muted); margin-top: 4px; }

/* ---------- Section entry cards ---------- */
.section-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}
.entry-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  border-top: 4px solid var(--color-gold);
  transition: box-shadow .15s, transform .15s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.entry-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.entry-card h3 { margin: 0; font-size: 18px; }
.entry-card p { margin: 0; color: var(--color-text-muted); font-size: 14px; }
.entry-card .go { margin-top: 8px; color: var(--color-navy); font-weight: 600; font-size: 14px; }

.page-header {
  padding: 40px 0 24px;
}
.page-header h1 { margin: 0 0 8px; font-size: 26px; color: var(--color-navy); }
.page-header p { margin: 0; color: var(--color-text-muted); font-size: 14px; }

/* ---------- Filter bar ---------- */
.filter-bar {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.filter-row .filter-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-text-muted);
  width: 88px;
  flex-shrink: 0;
}
.search-input {
  flex: 1;
  min-width: 220px;
  padding: 9px 14px;
  border-radius: 8px;
  border: 1px solid var(--color-border);
  font-size: 14px;
}
.search-input:focus { outline: none; border-color: var(--color-gold); }

.chip {
  display: inline-flex;
  align-items: center;
  padding: 5px 13px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 600;
  border: 1px solid var(--color-border);
  background: #fff;
  color: var(--color-text-muted);
  cursor: pointer;
  user-select: none;
  transition: all .12s;
}
.chip:hover { border-color: var(--color-gold); color: var(--color-text); }
.chip.active { background: var(--color-navy); border-color: var(--color-navy); color: #fff; }
.chip.tag-readonly { cursor: default; }
.chip.tag-readonly:hover { border-color: var(--color-border); color: var(--color-text-muted); }

/* tag color variants for readonly display */
.tag-purpose { background: #eaf1ff; color: #2454a8; border-color: #d3e2fb; }
.tag-special { background: #fdf1e3; color: #a3670f; border-color: #f7e0bd; }
.tag-mechanism { background: #eef7ee; color: #2f7a3a; border-color: #d7ecd9; }
.tag-todo { background: #fdeceb; color: var(--color-danger); border-color: #f7d4d1; }

/* ---------- Photos ---------- */
.card-photo {
  height: 130px;
  border-radius: 8px;
  overflow: hidden;
  background: #eef0f5;
}
.card-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-photo.photo-placeholder {
  display: flex; align-items: center; justify-content: center;
  border: 1px dashed var(--color-border);
  background: #f7f8fb;
  color: var(--color-text-muted);
  font-size: 13px;
}
.card-photo.img-error img { display: none; }
.photo-box {
  background: #f7f8fb;
  border: 1px dashed var(--color-border);
  border-radius: 8px;
  padding: 14px 16px;
  color: var(--color-text-muted);
  font-size: 13.5px;
}
.photo-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
}
.photo-gallery-item {
  display: block;
  height: 90px;
  border-radius: 8px;
  overflow: hidden;
  background: #eef0f5;
}
.photo-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ---------- Card grid ---------- */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
  padding-bottom: 60px;
}
.item-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.item-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.item-card .title { font-size: 16px; font-weight: 700; color: var(--color-navy); }
.item-card .meta { font-size: 12.5px; color: var(--color-text-muted); }
.item-card .desc {
  font-size: 13.5px;
  color: var(--color-text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.item-card .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.item-card .footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
  padding-top: 10px;
  border-top: 1px solid var(--color-border);
  font-size: 12.5px;
  color: var(--color-text-muted);
}
.author-badge { display: flex; align-items: center; gap: 6px; font-weight: 600; color: var(--color-navy); }
.avatar-circle {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--color-gold);
  color: var(--color-navy);
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-text-muted);
}
.empty-state .big { font-size: 40px; margin-bottom: 8px; }

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(22,34,63,0.55);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
  z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff;
  border-radius: var(--radius);
  max-width: 640px;
  width: 100%;
  padding: 28px 30px 30px;
  position: relative;
  box-shadow: var(--shadow-hover);
}
.modal-close {
  position: absolute; top: 18px; right: 20px;
  background: none; border: none; font-size: 20px; cursor: pointer; color: var(--color-text-muted);
}
.modal-box h2 { margin: 0 0 4px; color: var(--color-navy); font-size: 20px; }
.modal-sub { color: var(--color-text-muted); font-size: 13px; margin-bottom: 20px; }

.detail-section { margin-bottom: 16px; }
.detail-section .label { font-size: 12px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }
.detail-section .value { font-size: 14.5px; white-space: pre-line; }
.metrics-box {
  background: #fdeceb;
  border: 1px dashed #f0b8b1;
  border-radius: 8px;
  padding: 14px 16px;
  color: var(--color-danger);
  font-size: 13.5px;
}

/* ---------- Form ---------- */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--color-text);
}
.form-group .hint { font-weight: 400; color: var(--color-text-muted); font-size: 12px; }
.form-group input[type="text"],
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--color-border);
  font-size: 14px;
  font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--color-gold);
}
.chip-select-group { display: flex; flex-wrap: wrap; gap: 8px; }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
.form-banner {
  background: var(--color-gold-light);
  color: #6b4d0f;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12.5px;
  margin-bottom: 18px;
}
.toast {
  position: fixed;
  bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--color-navy); color: #fff;
  padding: 12px 22px; border-radius: 8px;
  font-size: 14px; box-shadow: var(--shadow-hover);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.toast.show { opacity: 1; }

footer.site-footer {
  text-align: center;
  color: var(--color-text-muted);
  font-size: 12.5px;
  padding: 30px 0 40px;
}
</style>
<script>
// 全站共用的標籤定義與 UI 輔助函式

const PURPOSE_TAGS = ['拉新', '回流', '留存', '付費', '版本導流', '品牌口碑'];

const SPECIAL_TAG_SUGGESTIONS = [
  '時事熱點', '節慶檔期', 'IP聯動', '週年慶', '新版本上市',
  '電競賽事聯動', '老玩家回歸', '低開發成本', '需搭配抽卡機制',
];

const MECHANISM_TAGS = [
  '益智消除', '反應操作', '心理測驗', '經營模擬', '任務養成',
  '抽獎機率', '社交邀請', '陣營競賽', '劇情回顧', '音樂節奏', '其他',
];

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function tagChip(text, variant, opts) {
  opts = opts || {};
  const cls = `chip tag-readonly ${variant ? 'tag-' + variant : ''}`;
  return `<span class="${cls}"${opts.title ? ` title="${escapeHtml(opts.title)}"` : ''}>${escapeHtml(text)}</span>`;
}

function tagRow(tags, variant) {
  if (!tags || !tags.length) return '';
  return `<div class="tag-row">${tags.map((t) => tagChip(t, variant)).join('')}</div>`;
}

function purposeTagsOrTodo(tags) {
  if (tags && tags.length) return tagRow(tags, 'purpose');
  return tagChip('設計目的待補充', 'todo');
}

function cardPhotoHtml(images) {
  if (images && images.length) {
    return `<div class="card-photo"><img src="${escapeHtml(images[0])}" alt="" loading="lazy" onerror="this.closest('.card-photo').classList.add('img-error')"></div>`;
  }
  return `<div class="card-photo photo-placeholder"><span>🖼️ 尚無照片</span></div>`;
}

function photoGalleryHtml(images) {
  if (!images || !images.length) {
    return `<div class="photo-box">🖼️ 照片待補充——之後有活動截圖或素材可以補在這裡。</div>`;
  }
  return `<div class="photo-gallery">${images
    .map(
      (url) =>
        `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" class="photo-gallery-item"><img src="${escapeHtml(url)}" alt="" loading="lazy"></a>`
    )
    .join('')}</div>`;
}

function initialsOf(name) {
  if (!name) return '?';
  const trimmed = name.trim();
  return trimmed.slice(0, 1).toUpperCase();
}

function formatDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
}

function debounce(fn, delay) {
  let timer = null;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay || 250);
  };
}

function toast(msg) {
  let el = document.querySelector('.toast');
  if (!el) {
    el = document.createElement('div');
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

function renderChipSelect(container, tags, selected) {
  container.innerHTML = tags
    .map((t) => `<span class="chip" data-value="${escapeHtml(t)}">${escapeHtml(t)}</span>`)
    .join('');
  container.querySelectorAll('.chip').forEach((chip) => {
    if (selected.includes(chip.dataset.value)) chip.classList.add('active');
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
    });
  });
}

function getSelectedChips(container) {
  return [...container.querySelectorAll('.chip.active')].map((c) => c.dataset.value);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.addEventListener('click', (e) => {
  if (e.target.classList && e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});
</script>
<script>
// 資料存取層（正式共用版）：透過 google.script.run 呼叫 Code.gs 裡的伺服器函式，
// 不需要 fetch()，也就不會遇到「網域限定存取」造成的登入導向問題。

function callServer(fnName, payload) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function (err) { reject(err); })
      [fnName](payload);
  });
}

async function fetchActivities() {
  const result = await callServer('getActivitiesForClient');
  return Array.isArray(result) ? result : [];
}

async function fetchIdeas() {
  const result = await callServer('getIdeasForClient');
  return Array.isArray(result) ? result : [];
}

async function submitIdea(data) {
  return callServer('addIdeaForClient', data);
}

async function submitActivity(data) {
  return callServer('addActivityForClient', data);
}

async function generateSuggestions(data) {
  try {
    return await callServer('generateSuggestionForClient', data);
  } catch (err) {
    return { error: (err && err.message) ? err.message : String(err) };
  }
}
</script>
